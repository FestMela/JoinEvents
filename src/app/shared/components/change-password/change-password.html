<div class="modal-overlay" (click)="close.emit()">
    <div class="change-password-modal slide-in-up" (click)="$event.stopPropagation()">
        <div class="modal-header">
            <div>
                <h4 class="fw-900 m-0">Change Password</h4>
                <p class="text-muted small m-0">Secure your account with a strong password</p>
            </div>
            <button class="btn-close-custom" (click)="close.emit()">
                <i class="bi bi-x-lg"></i>
            </button>
        </div>

        <form (ngSubmit)="onSubmit()" #pwForm="ngForm" class="modal-body">
            <!-- Current Password -->
            <div class="mb-4">
                <label class="ee-form-label">Current Password</label>
                <div class="input-group-custom">
                    <input [type]="showCurrent() ? 'text' : 'password'" 
                           class="ee-form-control" 
                           [(ngModel)]="passwordData.current" 
                           name="current" 
                           required 
                           placeholder="Enter current password">
                    <button type="button" (click)="showCurrent.set(!showCurrent())">
                        <i class="bi" [class.bi-eye]="!showCurrent()" [class.bi-eye-slash]="showCurrent()"></i>
                    </button>
                </div>
            </div>

            <!-- New Password -->
            <div class="mb-4">
                <label class="ee-form-label">New Password</label>
                <div class="input-group-custom">
                    <input [type]="showNew() ? 'text' : 'password'" 
                           class="ee-form-control" 
                           [(ngModel)]="passwordData.new" 
                           name="new" 
                           required 
                           placeholder="At least 6 characters">
                    <button type="button" (click)="showNew.set(!showNew())">
                        <i class="bi" [class.bi-eye]="!showNew()" [class.bi-eye-slash]="showNew()"></i>
                    </button>
                </div>
            </div>

            <!-- Confirm New Password -->
            <div class="mb-5">
                <label class="ee-form-label">Confirm New Password</label>
                <div class="input-group-custom">
                    <input [type]="showConfirm() ? 'text' : 'password'" 
                           class="ee-form-control" 
                           [(ngModel)]="passwordData.confirm" 
                           name="confirm" 
                           required 
                           placeholder="Repeat new password">
                    <button type="button" (click)="showConfirm.set(!showConfirm())">
                        <i class="bi" [class.bi-eye]="!showConfirm()" [class.bi-eye-slash]="showConfirm()"></i>
                    </button>
                </div>
            </div>

            <div class="modal-footer p-0">
                <button type="button" class="btn-ee-light w-100 mb-2" (click)="close.emit()">Cancel</button>
                <button type="submit" class="btn-ee-primary w-100" [disabled]="!pwForm.form.valid">Update Password</button>
            </div>
        </form>
    </div>
</div>
