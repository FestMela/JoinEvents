<div class="login-page">
  <!-- Left Panel -->
  <div class="login-left">
    <div class="login-left-content">
      <div class="d-flex align-items-center gap-2 mb-5">
        <div class="brand-logo-hero">
          <img src="src/img/JoinEvents.png" alt="Logo" style="width:100%; height:100%; object-fit:contain;" (error)="handleImageError($event)">
          <i class="bi bi-stars" style="display:none"></i>
        </div>
        <span class="brand-text-hero"><span class="brand-join">Join</span><span class="brand-events">Events</span></span>
      </div>
      <div class="float">
        <div class="hero-illustration">
          <i class="bi bi-calendar-heart" style="font-size:5rem;color:rgba(255,255,255,0.2);display:block;text-align:center;"></i>
        </div>
      </div>
      <h2 style="color:white;font-family:var(--font-heading);font-size:1.8rem;font-weight:700;margin-top:24px;">Welcome Back!</h2>
      <p style="color:rgba(255,255,255,0.65);font-size:0.9rem;margin-top:8px;">Sign in to discover events, book vendors, and manage your celebrations.</p>
    </div>
  </div>

  <!-- Right Panel -->
  <div class="login-right">
    <div class="login-form-container">
      <div class="mb-4 text-center">
        <h3 class="login-title">Sign In</h3>
        <p class="login-sub">Access your personal event planner account</p>
      </div>

      <!-- Social Login -->
      <div class="social-login-grid mb-4">
        <button type="button" class="social-btn google-btn" (click)="loginWithSocial('Google')" title="Continue with Google">
          <i class="bi bi-google"></i>
        </button>
        <button type="button" class="social-btn facebook-btn" (click)="loginWithSocial('Facebook')" title="Continue with Facebook">
          <i class="bi bi-facebook"></i>
        </button>
        <button type="button" class="social-btn instagram-btn" (click)="loginWithSocial('Instagram')" title="Continue with Instagram">
          <i class="bi bi-instagram"></i>
        </button>
      </div>

      <div class="divider d-flex align-items-center mb-4">
        <hr class="flex-grow-1">
        <span class="mx-3 text-muted small fw-bold">OR</span>
        <hr class="flex-grow-1">
      </div>

      <!-- Form -->
      <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
        <div class="mb-3">
          <label class="ee-form-label">Email Address</label>
          <div class="input-with-icon">
            <i class="bi bi-envelope input-icon"></i>
            <input type="email" class="ee-form-control ps-5" [(ngModel)]="email" name="email"
                   placeholder="Enter your email" required>
          </div>
        </div>

        <div class="mb-4">
          <label class="ee-form-label">Password</label>
          <div class="input-with-icon">
            <i class="bi bi-lock input-icon"></i>
            <input [type]="showPassword ? 'text' : 'password'" class="ee-form-control ps-5 pe-5"
                   [(ngModel)]="password" name="password" placeholder="Enter password" required>
            <i class="bi input-icon-right cursor-pointer"
               [class.bi-eye]="!showPassword" [class.bi-eye-slash]="showPassword"
               (click)="showPassword = !showPassword"></i>
          </div>
          <div class="d-flex justify-content-between align-items-start mt-3">
            <label class="d-flex align-items-start gap-2" style="cursor:pointer; user-select:none;">
              <input type="checkbox" [(ngModel)]="rememberMe" name="rememberMe" style="margin-top:3px">
              <span style="font-size:0.82rem;color:var(--text-muted);font-weight:500;">Remember Me</span>
            </label>
            <a routerLink="/forgot-password" class="link-primary-ee small" style="font-size:0.8rem;font-weight:500;margin-top:1px;">Forgot Password?</a>
          </div>
        </div>

        <button type="submit" class="btn-ee-primary w-100 justify-content-center py-3" [disabled]="isLoading">
          @if (isLoading) {
            <span class="spinner-border spinner-border-sm me-2"></span>Signing in...
          } @else {
            <i class="bi bi-box-arrow-in-right"></i> Sign In
          }
        </button>
      </form>

      <div class="text-center mt-4">
        <p style="color:var(--slate);font-size:0.85rem; margin-bottom: 0.5rem;">
          Don't have an account? <a routerLink="/register" class="link-primary-ee">Register here</a>
        </p>
        <p style="color:var(--slate);font-size:0.85rem;">
          Are you a vendor or staff? <a routerLink="/partner-login" class="link-primary-ee">Login here</a>
        </p>
        <a routerLink="/" class="link-back"><i class="bi bi-arrow-left me-1"></i>Back to Home</a>
      </div>
    </div>
  </div>
</div>
